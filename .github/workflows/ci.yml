name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # diff-cover compares the PR against its base branch, so we need the
          # base ref's history — a shallow clone wouldn't have it.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test with coverage
        run: |
          pytest --cov=src/pr_warden --cov-report=xml --cov-report=term-missing

      # Diff coverage: not total coverage — just "are the lines this PR changed
      # exercised by any test?" The one signal most correlated with "will this
      # break in prod." Skipped on push-to-main (no base branch to diff against).
      - name: Diff coverage
        if: github.event_name == 'pull_request'
        run: |
          diff-cover coverage.xml \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=80 \
            --markdown-report=diff-cover.md
          cat diff-cover.md >> "$GITHUB_STEP_SUMMARY"
